<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>日常帳本記錄器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:#0F1923; --bg2:#162032; --bg3:#1E2D40; --card:#1A2D3D;
  --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.14);
  --text:#E8EDF2; --text2:#8FA5BB; --text3:#5A7A96;
  --accent:#4A9EFF; --accent2:#2979C9;
  --green:#3DB87A; --amber:#F0A52A; --red:#E85454; --purple:#A57FE8; --teal:#38C9A8;
  --r:10px; --rl:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang TC','Noto Sans TC',sans-serif;min-height:100vh;padding:0 0 80px;font-size:16px;}

header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
header h1{font-size:18px;font-weight:600;}
.date-badge{font-size:14px;color:var(--text2);background:var(--bg3);padding:5px 12px;border-radius:20px;border:1px solid var(--border);}

.section{padding:16px 12px 0;}
.section-title{font-size:12px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}

.status-bar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:12px;margin:12px 12px 0;}
.status-row{display:flex;gap:10px;}
.status-card{flex:1;background:var(--bg3);border-radius:var(--r);padding:10px;text-align:center;}
.status-card .label{font-size:12px;color:var(--text3);margin-bottom:4px;}
.status-card .value{font-size:20px;font-weight:700;}
.value.green{color:var(--green);} .value.amber{color:var(--amber);} .value.red{color:var(--red);}

.date-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.date-row label{font-size:14px;color:var(--text2);white-space:nowrap;}
.date-row input[type=date]{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);padding:10px 10px;font-size:15px;outline:none;min-width:0;}
.date-row input[type=date]:focus{border-color:var(--accent);}

textarea.memo{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);padding:10px;font-size:15px;outline:none;margin-bottom:12px;resize:none;font-family:inherit;}
textarea.memo::placeholder{color:var(--text3);}
textarea.memo:focus{border-color:var(--accent);}

.cat-tabs{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
.cat-tab{flex-shrink:0;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;color:var(--text2);padding:8px 16px;font-size:14px;cursor:pointer;white-space:nowrap;}
.cat-tab.active{background:var(--accent2);border-color:var(--accent);color:#fff;}

.items-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.item-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px;}
.item-label{font-size:12px;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:4px;}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0;}
.dot-f{background:var(--amber);} .dot-t{background:var(--teal);} .dot-m{background:var(--purple);}
.item-row{display:flex;gap:5px;}
.item-amt{width:72px;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;color:var(--text);padding:8px 6px;font-size:15px;outline:none;text-align:right;flex-shrink:0;}
.item-amt:focus{border-color:var(--accent);}
.item-det{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;color:var(--text);padding:8px 6px;font-size:14px;outline:none;min-width:0;}
.item-det::placeholder{color:var(--text3);}
.item-det:focus{border-color:var(--accent);}

.wallet-row{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:10px;}
.wallet-label{font-size:14px;color:var(--text2);white-space:nowrap;min-width:72px;}
.wallet-input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;color:var(--text);padding:8px 10px;font-size:17px;font-weight:600;outline:none;text-align:right;min-width:0;}
.wallet-input:focus{border-color:var(--green);}

.daily-total{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.daily-total .label{font-size:14px;color:var(--text2);}
.daily-total .amount{font-size:20px;font-weight:700;color:var(--amber);}

.submit-btn{width:100%;background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;border-radius:var(--r);color:#fff;padding:14px;font-size:16px;font-weight:600;cursor:pointer;letter-spacing:0.5px;}
.submit-btn:active{opacity:0.85;}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;}

/* Chart section */
.chart-section{padding:16px 12px 0;}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:14px;margin-bottom:12px;}
.chart-title{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--text);}
.chart-wrap{position:relative;height:220px;}
.chart-tabs{display:flex;gap:6px;margin-bottom:12px;}
.chart-tab{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text2);padding:7px;font-size:13px;cursor:pointer;text-align:center;}
.chart-tab.active{background:var(--accent2);border-color:var(--accent);color:#fff;}
.legend-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A3A2A;border:1px solid var(--green);color:var(--green);padding:10px 20px;border-radius:20px;font-size:14px;font-weight:500;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;z-index:200;}
.toast.error{background:#3A1A1A;border-color:var(--red);color:var(--red);}
.toast.show{opacity:1;}
</style>
</head>
<body>

<header>
  <h1>📒 日常帳本</h1>
  <div class="date-badge" id="headerDate"></div>
</header>

<div class="status-bar">
  <div class="status-row">
    <div class="status-card">
      <div class="label">今日支出</div>
      <div class="value amber" id="statToday">$0</div>
    </div>
    <div class="status-card">
      <div class="label">錢包餘額</div>
      <div class="value green" id="statWallet">—</div>
    </div>
  </div>
</div>

<!-- 記帳區 -->
<div class="section">
  <div class="section-title">今日記帳</div>
  <div class="date-row">
    <label>日期</label>
    <input type="date" id="entryDate">
  </div>
  <textarea class="memo" id="entryMemo" rows="2" placeholder="今日活動備忘（例：排球、益豪開會、五指山）"></textarea>

  <div class="cat-tabs">
    <div class="cat-tab active" onclick="switchTab(this,'food')">🍱 飲食</div>
    <div class="cat-tab" onclick="switchTab(this,'transport')">🚇 交通</div>
    <div class="cat-tab" onclick="switchTab(this,'misc')">🗂 雜項</div>
  </div>

  <div id="tab-food">
    <div class="items-grid">
      <div class="item-card"><div class="item-label"><span class="dot dot-f"></span>早餐</div><div class="item-row"><input class="item-amt" type="number" id="f_b" placeholder="0" min="0" oninput="calc()"><input class="item-det" type="text" id="f_b_d" placeholder="明細"></div></div>
      <div class="item-card"><div class="item-label"><span class="dot dot-f"></span>午餐</div><div class="item-row"><input class="item-amt" type="number" id="f_l" placeholder="0" min="0" oninput="calc()"><input class="item-det" type="text" id="f_l_d" placeholder="明細"></div></div>
      <div class="item-card"><div class="item-label"><span class="dot dot-f"></span>晚餐</div><div class="item-row"><input class="item-amt" type="number" id="f_d" placeholder="0" min="0" oninput="calc()"><input class="item-det" type="text" id="f_d_d" placeholder="明細"></div></div>
      <div class="item-card"><div class="item-label"><span class="dot dot-f"></span>下午茶</div><div class="item-row"><input class="item-amt" type="number" id="f_a" placeholder="0" min="0" oninput="calc()"><input class="item-det" type="text" id="f_a_d" placeholder="明細"></div></div>
      <div class="item-card"><div class="item-label"><span class="dot dot-f"></span>飲料</div><div class="item-row"><input class="item-amt" type="number" id="f_dr" placeholder="0" min="0" oninput="calc()"><input class="item-det" type="text" id="f_dr_d" placeholder="明細"></div></div>
      <div class="item-card"><div class="item-label"><span class="dot dot-f"></span>消夜</div><div class="item-row"><input class="item-amt" type="number" id="f_n" placeholder="0" min="0" oninput="calc()"><input class="item-det" type="text" id="f_n_d" placeholder="明細"></div></div>
    </div>
  </div>

  <div id="tab-transport" style="display:none">
    <div class="items-grid">
      <div class="item-card"><div class="item-label"><span class="dot dot-t"></span>汽車油錢</div><div class="item-row"><input class="item-amt" type="number" id="t_c" placeholder="0" min="0" oninput="calc()"><input class="item-det" type="text" id="t_c_d" placeholder="明細"></div></div>
      <div class="item-card"><div class="item-label"><span class="dot dot-t"></span>機車油錢</div><div class="item-row"><input class="item-amt" type="number" id="t_m" placeholder="0" min="0" oninput="calc()"><input class="item-det" type="text" id="t_m_d" placeholder="明細"></div></div>
      <div class="item-card"><div class="item-label"><span class="dot dot-t"></span>交通 1</div><div class="item-row"><input class="item-amt" type="number" id="t_1" placeholder="0" min="0" oninput="calc()"><input class="item-det" type="text" id="t_1_d" placeholder="明細"></div></div>
      <div class="item-card"><div class="item-label"><span class="dot dot-t"></span>交通 2</div><div class="item-row"><input class="item-amt" type="number" id="t_2" placeholder="0" min="0" oninput="calc()"><input class="item-det" type="text" id="t_2_d" placeholder="明細"></div></div>
      <div class="item-card"><div class="item-label"><span class="dot dot-t"></span>停車費 1</div><div class="item-row"><input class="item-amt" type="number" id="t_p1" placeholder="0" min="0" oninput="calc()"><input class="item-det" type="text" id="t_p1_d" placeholder="明細"></div></div>
      <div class="item-card"><div class="item-label"><span class="dot dot-t"></span>停車費 2</div><div class="item-row"><input class="item-amt" type="number" id="t_p2" placeholder="0" min="0" oninput="calc()"><input class="item-det" type="text" id="t_p2_d" placeholder="明細"></div></div>
    </div>
  </div>

  <div id="tab-misc" style="display:none">
    <div class="items-grid">
      <div class="item-card"><div class="item-label"><span class="dot dot-m"></span>雜項 1</div><div class="item-row"><input class="item-amt" type="number" id="m_1" placeholder="0" min="0" oninput="calc()"><input class="item-det" type="text" id="m_1_d" placeholder="明細"></div></div>
      <div class="item-card"><div class="item-label"><span class="dot dot-m"></span>雜項 2</div><div class="item-row"><input class="item-amt" type="number" id="m_2" placeholder="0" min="0" oninput="calc()"><input class="item-det" type="text" id="m_2_d" placeholder="明細"></div></div>
      <div class="item-card"><div class="item-label"><span class="dot dot-m"></span>雜項 3</div><div class="item-row"><input class="item-amt" type="number" id="m_3" placeholder="0" min="0" oninput="calc()"><input class="item-det" type="text" id="m_3_d" placeholder="明細"></div></div>
      <div class="item-card"><div class="item-label"><span class="dot dot-m"></span>美安消費 1</div><div class="item-row"><input class="item-amt" type="number" id="m_a1" placeholder="0" min="0" oninput="calc()"><input class="item-det" type="text" id="m_a1_d" placeholder="明細"></div></div>
      <div class="item-card"><div class="item-label"><span class="dot dot-m"></span>美安消費 2</div><div class="item-row"><input class="item-amt" type="number" id="m_a2" placeholder="0" min="0" oninput="calc()"><input class="item-det" type="text" id="m_a2_d" placeholder="明細"></div></div>
      <div class="item-card"><div class="item-label"><span class="dot dot-m"></span>美安消費 3</div><div class="item-row"><input class="item-amt" type="number" id="m_a3" placeholder="0" min="0" oninput="calc()"><input class="item-det" type="text" id="m_a3_d" placeholder="明細"></div></div>
    </div>
  </div>

  <div class="section-title" style="margin-top:6px">錢包餘額</div>
  <div class="wallet-row">
    <div class="wallet-label">💰 錢包</div>
    <input class="wallet-input" type="number" id="walletBal" placeholder="0" min="0" oninput="calc()">
    <div style="font-size:14px;color:var(--text3);flex-shrink:0;">元</div>
  </div>

  <div class="daily-total">
    <div class="label">今日總支出</div>
    <div class="amount" id="totalAmt">$0</div>
  </div>
  <button class="submit-btn" id="submitBtn" onclick="submitEntry()">☁️ 送出到 Google Sheets</button>
</div>

<!-- 圖表區 -->
<div class="chart-section">
  <div class="section-title">本月花費統計</div>
  <div class="chart-card">
    <div class="chart-tabs">
      <div class="chart-tab active" onclick="switchChart(this,'pie')">🥧 類別圓餅</div>
      <div class="chart-tab" onclick="switchChart(this,'bar')">📊 每日長條</div>
    </div>
    <div class="chart-wrap">
      <canvas id="myChart"></canvas>
    </div>
    <div class="legend-grid" id="legendGrid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 寫死的設定 ──────────────────────────────────────
const GAS_URL = 'https://script.google.com/macros/s/AKfycbw2VEPXW4SVYEVqgjk2s12_dkbpRt0OE4OS9UEM9O0QLxVdQAy5gGXxGtQPqUSsGJej/exec';
const SHEET_NAME = '2026';

// ── 欄位 ID 清單 ─────────────────────────────────────
const FOOD_IDS  = ['f_b','f_l','f_d','f_a','f_dr','f_n'];
const TRANS_IDS = ['t_c','t_m','t_1','t_2','t_p1','t_p2'];
const MISC_IDS  = ['m_1','m_2','m_3','m_a1','m_a2','m_a3'];
const ALL_IDS   = [...FOOD_IDS,...TRANS_IDS,...MISC_IDS];

// ── 本月資料（從 localStorage 累積）─────────────────
const MONTH_KEY = 'ledger_month_' + new Date().getFullYear() + '_' + (new Date().getMonth()+1);
let monthData = JSON.parse(localStorage.getItem(MONTH_KEY)||'[]');

// ── 圖表 ─────────────────────────────────────────────
let chart = null;
let chartMode = 'pie';

const COLORS = {
  food:'#F0A52A', transport:'#38C9A8', misc:'#A57FE8',
  amway:'#4A9EFF', park:'#E85454'
};

function buildChartData(mode) {
  if (mode === 'pie') {
    let food=0, transport=0, misc=0;
    monthData.forEach(e => {
      food      += (e.breakfast||0)+(e.lunch||0)+(e.dinner||0)+(e.afternoon||0)+(e.drink||0)+(e.night||0);
      transport += (e.car||0)+(e.moto||0)+(e.t1||0)+(e.t2||0)+(e.park1||0)+(e.park2||0);
      misc      += (e.misc1||0)+(e.misc2||0)+(e.misc3||0)+(e.amway1||0)+(e.amway2||0)+(e.amway3||0);
    });
    return {
      labels:['飲食','交通','雜項'],
      datasets:[{data:[food,transport,misc],backgroundColor:['#F0A52A','#38C9A8','#A57FE8'],borderWidth:0}]
    };
  } else {
    const days = {};
    monthData.forEach(e => {
      const d = e.date ? e.date.slice(8) : '??';
      if (!days[d]) days[d] = 0;
      days[d] += ALL_IDS.reduce((s,id) => s + (e[id.replace(/_d$/,'')] || 0), 0);
    });
    const labels = Object.keys(days).sort();
    return {
      labels: labels.map(d => d+'日'),
      datasets:[{data:labels.map(d=>days[d]),backgroundColor:'#4A9EFF',borderRadius:6,borderSkipped:false}]
    };
  }
}

function renderChart() {
  const data = buildChartData(chartMode);
  if (chart) chart.destroy();
  const ctx = document.getElementById('myChart').getContext('2d');
  chart = new Chart(ctx, {
    type: chartMode === 'pie' ? 'doughnut' : 'bar',
    data,
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'$'+ctx.raw.toLocaleString()}}},
      scales: chartMode === 'bar' ? {
        x:{ticks:{color:'#8FA5BB',font:{size:11}},grid:{color:'rgba(255,255,255,0.05)'}},
        y:{ticks:{color:'#8FA5BB',font:{size:11},callback:v=>'$'+v},grid:{color:'rgba(255,255,255,0.05)'}}
      } : {}
    }
  });
  // legend
  const lg = document.getElementById('legendGrid');
  if (chartMode === 'pie') {
    const items = [['飲食','#F0A52A'],['交通','#38C9A8'],['雜項','#A57FE8']];
    const totals = data.datasets[0].data;
    const total = totals.reduce((a,b)=>a+b,0);
    lg.innerHTML = items.map((it,i)=>`<div class="legend-item"><span class="legend-dot" style="background:${it[1]}"></span>${it[0]} $${totals[i].toLocaleString()} <span style="color:var(--text3);font-size:12px">${total?Math.round(totals[i]/total*100):0}%</span></div>`).join('');
  } else {
    const grand = data.datasets[0].data.reduce((a,b)=>a+b,0);
    lg.innerHTML = `<div class="legend-item" style="grid-column:1/-1">本月累計 <strong style="color:var(--amber)">$${grand.toLocaleString()}</strong></div>`;
  }
}

function switchChart(el, mode) {
  document.querySelectorAll('.chart-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  chartMode = mode;
  renderChart();
}

// ── 初始化 ────────────────────────────────────────────
function init() {
  const today = new Date();
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  document.getElementById('entryDate').value = `${today.getFullYear()}-${mm}-${dd}`;
  document.getElementById('headerDate').textContent = `${mm}/${dd}`;
  calc();
  setTimeout(renderChart, 100);
}

function switchTab(el, name) {
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['food','transport','misc'].forEach(t=>document.getElementById('tab-'+t).style.display=t===name?'':'none');
}

function v(id) { return parseFloat(document.getElementById(id).value)||0; }

function calc() {
  const total = ALL_IDS.reduce((s,id)=>s+v(id),0);
  document.getElementById('totalAmt').textContent = '$'+total.toLocaleString();
  document.getElementById('statToday').textContent = '$'+total.toLocaleString();
  const w = v('walletBal');
  if (w > 0) {
    document.getElementById('statWallet').textContent = '$'+w.toLocaleString();
    document.getElementById('statWallet').className = 'value '+(w<500?'red':w<2000?'amber':'green');
  }
}

function showToast(msg, isErr=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast'+(isErr?' error':'');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

async function submitEntry() {
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 上傳中…';

  const date = document.getElementById('entryDate').value;
  const payload = {
    sheet: SHEET_NAME, date,
    memo: document.getElementById('entryMemo').value.trim(),
    wallet: v('walletBal'),
    breakfast:v('f_b'), breakfast_d:document.getElementById('f_b_d').value,
    lunch:v('f_l'),     lunch_d:document.getElementById('f_l_d').value,
    dinner:v('f_d'),    dinner_d:document.getElementById('f_d_d').value,
    afternoon:v('f_a'), afternoon_d:document.getElementById('f_a_d').value,
    drink:v('f_dr'),    drink_d:document.getElementById('f_dr_d').value,
    night:v('f_n'),     night_d:document.getElementById('f_n_d').value,
    car:v('t_c'),       car_d:document.getElementById('t_c_d').value,
    moto:v('t_m'),      moto_d:document.getElementById('t_m_d').value,
    t1:v('t_1'),        t1_d:document.getElementById('t_1_d').value,
    t2:v('t_2'),        t2_d:document.getElementById('t_2_d').value,
    park1:v('t_p1'),    park1_d:document.getElementById('t_p1_d').value,
    park2:v('t_p2'),    park2_d:document.getElementById('t_p2_d').value,
    misc1:v('m_1'),     misc1_d:document.getElementById('m_1_d').value,
    misc2:v('m_2'),     misc2_d:document.getElementById('m_2_d').value,
    misc3:v('m_3'),     misc3_d:document.getElementById('m_3_d').value,
    amway1:v('m_a1'),   amway1_d:document.getElementById('m_a1_d').value,
    amway2:v('m_a2'),   amway2_d:document.getElementById('m_a2_d').value,
    amway3:v('m_a3'),   amway3_d:document.getElementById('m_a3_d').value,
  };

  try {
    await fetch(GAS_URL, {method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
    // 存到本地月份統計
    monthData.push(payload);
    localStorage.setItem(MONTH_KEY, JSON.stringify(monthData));
    renderChart();
    showToast('✅ 已送出到 Google Sheets！');
    clearForm();
  } catch(e) {
    showToast('❌ 上傳失敗，請確認網路', true);
  } finally {
    btn.disabled = false;
    btn.textContent = '☁️ 送出到 Google Sheets';
  }
}

function clearForm() {
  ALL_IDS.forEach(id => {
    document.getElementById(id).value = '';
    const det = document.getElementById(id+'_d');
    if (det) det.value = '';
  });
  document.getElementById('entryMemo').value = '';
  document.getElementById('walletBal').value = '';
  calc();
}

init();
</script>
</body>
</html>
