<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="日常帳本">
<meta name="theme-color" content="#0F1923">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>日常帳本記錄器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#0F1923;--bg2:#162032;--bg3:#1E2D40;--card:#1A2D3D;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#E8EDF2;--text2:#8FA5BB;--text3:#5A7A96;--accent:#4A9EFF;--accent2:#2979C9;--green:#3DB87A;--amber:#F0A52A;--red:#E85454;--purple:#A57FE8;--teal:#38C9A8;--r:10px;--rl:14px;}
*{box-sizing:border-box;margin:0;padding:0;}
html{overflow-x:hidden;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang TC','Noto Sans TC',sans-serif;min-height:100vh;padding:0 0 80px;font-size:16px;overflow-x:hidden;width:100%;}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header-left{display:flex;align-items:center;gap:10px;}
.header-logo{height:38px;width:auto;object-fit:contain;}
header h1{font-size:17px;font-weight:600;}
.date-badge{font-size:14px;color:var(--text2);background:var(--bg3);padding:5px 12px;border-radius:20px;border:1px solid var(--border);white-space:nowrap;}

/* ── 狀態列 ── */
.status-bar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:12px;margin:12px 12px 0;}
.status-row{display:flex;gap:10px;}
.status-card{flex:1;background:var(--bg3);border-radius:var(--r);padding:10px;text-align:center;min-width:0;}
.status-card .label{font-size:12px;color:var(--text3);margin-bottom:4px;}
.status-card .value{font-size:20px;font-weight:700;}
.value.green{color:var(--green);}.value.amber{color:var(--amber);}.value.red{color:var(--red);}

/* ── 帳戶餘額 Dashboard ── */
.balance-section{padding:12px 12px 0;}
.balance-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:14px;}
.balance-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.balance-title{font-size:15px;font-weight:600;color:var(--text);}
.balance-date{font-size:12px;color:var(--text3);}
.balance-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.bal-item{background:var(--bg3);border-radius:var(--r);padding:10px 8px;text-align:center;}
.bal-label{font-size:11px;color:var(--text3);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bal-value{font-size:15px;font-weight:700;color:var(--teal);}
.bal-value.wallet{color:var(--green);}
.bal-value.zero{color:var(--text3);font-weight:400;}
.balance-loading{text-align:center;color:var(--text3);font-size:13px;padding:20px 0;}

/* ── 記帳區 ── */
.section{padding:16px 12px 0;}
.section-title{font-size:12px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
.date-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.date-row label{font-size:14px;color:var(--text2);white-space:nowrap;}
.date-row input[type=date]{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);padding:10px;font-size:15px;outline:none;min-width:0;width:100%;}
.date-row input[type=date]:focus{border-color:var(--accent);}
textarea.memo{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);padding:10px;font-size:15px;outline:none;margin-bottom:12px;resize:none;font-family:inherit;}
textarea.memo::placeholder{color:var(--text3);}
textarea.memo:focus{border-color:var(--accent);}
.cat-tabs{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.cat-tabs::-webkit-scrollbar{display:none;}
.cat-tab{flex-shrink:0;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;color:var(--text2);padding:8px 16px;font-size:14px;cursor:pointer;white-space:nowrap;}
.cat-tab.active{background:var(--accent2);border-color:var(--accent);color:#fff;}

/* ── Item Cards ── */
.items-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.item-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;display:flex;align-items:center;gap:10px;}
.item-label{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px;white-space:nowrap;width:64px;flex-shrink:0;}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;}
.dot-f{background:var(--amber);}.dot-t{background:var(--teal);}.dot-m{background:var(--purple);}
.item-body{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0;}
.item-row{display:flex;gap:6px;}
.item-amt{width:80px;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;color:var(--text);padding:9px 8px;font-size:15px;outline:none;text-align:right;flex-shrink:0;}
.item-amt:focus{border-color:var(--accent);}
.item-det{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;color:var(--text);padding:9px 8px;font-size:14px;outline:none;min-width:0;width:100%;}
.item-det::placeholder{color:var(--text3);}
.item-det:focus{border-color:var(--accent);}

/* ── 零錢切換 ── */
.coin-toggle{display:none;gap:4px;}
.coin-toggle.show{display:flex;}
.coin-btn{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text3);padding:5px 4px;font-size:11px;cursor:pointer;text-align:center;transition:all 0.15s;}
.coin-btn.active-up{background:rgba(240,165,42,0.15);border-color:var(--amber);color:var(--amber);}
.coin-btn.active-down{background:rgba(61,184,122,0.15);border-color:var(--green);color:var(--green);}

/* ── 付款方式 ── */
.pay-toggle{display:none;gap:4px;}
.pay-toggle.show{display:flex;}
.pay-btn{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text3);padding:5px 3px;font-size:10px;cursor:pointer;text-align:center;transition:all 0.15s;white-space:nowrap;}
.pay-btn.active{background:rgba(74,158,255,0.15);border-color:var(--accent);color:var(--accent);}
.pay-btn.pay-linepay.active{background:rgba(61,184,122,0.15);border-color:var(--green);color:var(--green);}
.pay-btn.pay-sinopac.active{background:rgba(165,127,232,0.15);border-color:var(--purple);color:var(--purple);}
.pay-btn.pay-land.active{background:rgba(240,165,42,0.15);border-color:var(--amber);color:var(--amber);}

/* ── 錢包 & 送出 ── */
.wallet-row{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:10px;}
.wallet-label{font-size:14px;color:var(--text2);white-space:nowrap;min-width:60px;}
.wallet-input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;color:var(--text);padding:8px 10px;font-size:17px;font-weight:600;outline:none;text-align:right;min-width:0;}
.wallet-input:focus{border-color:var(--green);}
.daily-total{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.daily-total .label{font-size:14px;color:var(--text2);}
.daily-total .amount{font-size:20px;font-weight:700;color:var(--amber);}
.submit-btn{width:100%;background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;border-radius:var(--r);color:#fff;padding:14px;font-size:16px;font-weight:600;cursor:pointer;}
.submit-btn:active{opacity:0.85;}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;}

/* ── 圖表 ── */
.chart-section{padding:16px 12px 0;}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:14px;margin-bottom:12px;}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.chart-title{font-size:15px;font-weight:600;color:var(--text);}
.reload-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text2);padding:5px 10px;font-size:13px;cursor:pointer;white-space:nowrap;}
.reload-btn:active{opacity:0.7;}
.chart-tabs{display:flex;gap:6px;margin-bottom:12px;}
.chart-tab{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text2);padding:7px;font-size:13px;cursor:pointer;text-align:center;}
.chart-tab.active{background:var(--accent2);border-color:var(--accent);color:#fff;}
.chart-wrap{position:relative;height:220px;}
.legend-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.chart-loading{text-align:center;color:var(--text3);font-size:14px;padding:60px 0;}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A3A2A;border:1px solid var(--green);color:var(--green);padding:10px 20px;border-radius:20px;font-size:14px;font-weight:500;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;z-index:200;}
.toast.error{background:#3A1A1A;border-color:var(--red);color:var(--red);}
.toast.show{opacity:1;}
</style>
</head>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzNUhj0wD2EfHzoXNVNtMpW8RZEONNuXros1jOJQ--0RCtGAyWvGvTsx7arxH5jiGBq/exec';
const SHEET_NAME = '2026';

const FOOD_IDS  = ['f_b','f_l','f_d','f_a','f_dr','f_n'];
const TRANS_IDS = ['t_c','t_m','t_1','t_2','t_p1','t_p2'];
const MISC_IDS  = ['m_1','m_2','m_3','m_a1','m_a2','m_a3'];
const ALL_IDS   = [...FOOD_IDS,...TRANS_IDS,...MISC_IDS];

// 零錢狀態：'up'=整付roundup(預設), 'down'=零錢rounddown
const coinMode = {};
ALL_IDS.forEach(id => coinMode[id] = 'up');

// 付款方式：'cash'=現金, 'linepay'=LINE PAY, 'sinopac'=永豐卡, 'land'=土銀卡
const payMode = {};
ALL_IDS.forEach(id => payMode[id] = 'cash');

// 原始輸入金額（切換時重新計算用）
const rawAmt = {};

let chart = null;
let chartMode = 'pie';
let sheetRows = [];

// ── 初始化 ──────────────────────────────────────────
function init() {
  const today = new Date();
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  document.getElementById('entryDate').value = `${today.getFullYear()}-${mm}-${dd}`;
  document.getElementById('headerDate').textContent = `${mm}/${dd}`;
  document.getElementById('chartMonthLabel').textContent = today.getMonth()+1 + '月花費統計';
  calc();
  loadChartData();
  loadBalance();
}

// ── 帳戶餘額讀取 ─────────────────────────────────────
async function loadBalance() {
  const grid = document.getElementById('balGrid');
  const dateEl = document.getElementById('balDate');
  const debtGrid = document.getElementById('debtGrid');
  const debtDateEl = document.getElementById('debtDate');
  grid.innerHTML = '<div class="balance-loading" style="grid-column:1/-1">載入中…</div>';
  dateEl.textContent = '讀取中…';
  debtGrid.innerHTML = '<div class="balance-loading" style="grid-column:1/-1">載入中…</div>';
  debtDateEl.textContent = '讀取中…';
  try {
    const url = `${GAS_URL}?action=balance&sheet=${SHEET_NAME}`;
    const res = await fetch(url);
    const json = await res.json();
    if (json.status === 'ok' && json.found) {
      dateEl.textContent = json.date ? '最後更新：' + json.date : '';
      debtDateEl.textContent = json.date ? '最後更新：' + json.date : '';
      const accounts = [
        { label:'💰 錢包',    val: json.wallet,  cls:'wallet' },
        { label:'🏦 土地銀行', val: json.land    },
        { label:'🏦 玉山銀行', val: json.esun    },
        { label:'🏦 台新銀行', val: json.taishin },
        { label:'🏦 永豐銀行', val: json.sinopac },
        { label:'🏦 中信',    val: json.ctbc    },
        { label:'📱 LINE PAY',val: json.linepay  },
        { label:'🛒 全聯禮券', val: json.pxmart  },
        { label:'🏪 7-11禮券',val: json.seven   },
        { label:'📱 街口',    val: json.jkopay  },
      ];
      const debts = [
        { label:'💳 永豐卡費', val: json.sinopacDebt },
        { label:'💳 土銀卡費', val: json.landDebt    },
        { label:'💳 台新卡費', val: json.taishinDebt },
        { label:'💳 永豐信貸', val: json.sinopacLoan },
      ];
      const renderItem = a => {
        const isEmpty = a.val === null || a.val === '' || a.val === undefined;
        const valClass = isEmpty ? 'zero' : (a.cls || '');
        const display = isEmpty ? '—' : 'NT$' + Number(a.val).toLocaleString();
        return `<div class="bal-item"><div class="bal-label">${a.label}</div><div class="bal-value ${valClass}">${display}</div></div>`;
      };
      grid.innerHTML = accounts.map(renderItem).join('');
      debtGrid.innerHTML = debts.map(renderItem).join('');
    } else if (json.status === 'ok' && !json.found) {
      grid.innerHTML = '<div class="balance-loading" style="grid-column:1/-1;color:var(--text3)">尚無資料</div>';
      debtGrid.innerHTML = '<div class="balance-loading" style="grid-column:1/-1;color:var(--text3)">尚無資料</div>';
      dateEl.textContent = '';
      debtDateEl.textContent = '';
    } else {
      grid.innerHTML = '<div class="balance-loading" style="grid-column:1/-1;color:var(--red)">讀取失敗</div>';
      debtGrid.innerHTML = '<div class="balance-loading" style="grid-column:1/-1;color:var(--red)">讀取失敗</div>';
      dateEl.textContent = '';
      debtDateEl.textContent = '';
    }
  } catch(e) {
    grid.innerHTML = '<div class="balance-loading" style="grid-column:1/-1;color:var(--red)">GAS 尚未支援 balance，請先更新</div>';
    debtGrid.innerHTML = '<div class="balance-loading" style="grid-column:1/-1;color:var(--red)">GAS 尚未支援 balance，請先更新</div>';
    dateEl.textContent = '';
    debtDateEl.textContent = '';
  }
}

// ── 付款方式 ─────────────────────────────────────────
function setPay(id, mode, btn) {
  payMode[id] = mode;
  const toggle = document.getElementById('pt_' + id);
  toggle.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // 現金才顯示零錢切換
  const coinTgl = document.getElementById('ct_' + id);
  if (rawAmt[id] > 0) {
    coinTgl.style.display = mode === 'cash' ? 'flex' : 'none';
  }
}

// ── 零錢切換 ─────────────────────────────────────────
function setCoin(id, mode, btn) {
  coinMode[id] = mode;
  const toggle = document.getElementById('ct_' + id);
  toggle.querySelectorAll('.coin-btn').forEach(b => {
    b.classList.remove('active-up','active-down');
  });
  btn.classList.add(mode === 'up' ? 'active-up' : 'active-down');
  applyRound(id);
  calc();
}

function applyRound(id) {
  const raw = rawAmt[id];
  if (!raw) return;
  const el = document.getElementById(id);
  if (raw % 100 === 0) {
    el.value = raw; // 整百不需 round
    return;
  }
  if (coinMode[id] === 'up') {
    el.value = Math.ceil(raw / 100) * 100;
  } else {
    el.value = Math.floor(raw / 100) * 100;
  }
}

function onAmt(input) {
  const id = input.id;
  const val = parseFloat(input.value) || 0;
  rawAmt[id] = val;
  const coinTgl = document.getElementById('ct_' + id);
  const payTgl  = document.getElementById('pt_' + id);
  if (val > 0) {
    payTgl.classList.add('show');
    if (payMode[id] === 'cash') {
      coinTgl.classList.add('show');
      // 不自動 round，等使用者按整付↑或零錢↓才 round
    } else {
      coinTgl.classList.remove('show');
    }
  } else {
    payTgl.classList.remove('show');
    coinTgl.classList.remove('show');
    // reset
    coinMode[id] = 'up';
    payMode[id] = 'cash';
    const cbtns = coinTgl.querySelectorAll('.coin-btn');
    cbtns[0].classList.add('active-up');
    cbtns[1].classList.remove('active-down');
    const pbtns = payTgl.querySelectorAll('.pay-btn');
    pbtns[0].classList.add('active');
    pbtns[1].classList.remove('active');
    pbtns[2].classList.remove('active');
    pbtns[3].classList.remove('active');
  }
  calc();
}

// ── 計算總額 ─────────────────────────────────────────
function v(id) { return parseFloat(document.getElementById(id).value)||0; }

function calc() {
  const total = ALL_IDS.reduce((s,id)=>s+v(id),0);
  document.getElementById('totalAmt').textContent = 'NT$'+total.toLocaleString();
}

function showToast(msg, isErr=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast'+(isErr?' error':'');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

// ── 送出 ─────────────────────────────────────────────
async function submitEntry() {
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '⏳ 上傳中…';
  const date = document.getElementById('entryDate').value;
  const payload = {
    sheet:SHEET_NAME, date,
    memo:document.getElementById('entryMemo').value.trim(),
    wallet:v('walletBal'),
    breakfast:v('f_b'),   breakfast_d:document.getElementById('f_b_d').value,
    lunch:v('f_l'),       lunch_d:document.getElementById('f_l_d').value,
    dinner:v('f_d'),      dinner_d:document.getElementById('f_d_d').value,
    afternoon:v('f_a'),   afternoon_d:document.getElementById('f_a_d').value,
    drink:v('f_dr'),      drink_d:document.getElementById('f_dr_d').value,
    night:v('f_n'),       night_d:document.getElementById('f_n_d').value,
    car:v('t_c'),         car_d:document.getElementById('t_c_d').value,
    moto:v('t_m'),        moto_d:document.getElementById('t_m_d').value,
    t1:v('t_1'),          t1_d:document.getElementById('t_1_d').value,
    t2:v('t_2'),          t2_d:document.getElementById('t_2_d').value,
    park1:v('t_p1'),      park1_d:document.getElementById('t_p1_d').value,
    park2:v('t_p2'),      park2_d:document.getElementById('t_p2_d').value,
    misc1:v('m_1'),       misc1_d:document.getElementById('m_1_d').value,
    misc2:v('m_2'),       misc2_d:document.getElementById('m_2_d').value,
    misc3:v('m_3'),       misc3_d:document.getElementById('m_3_d').value,
    amway1:v('m_a1'),     amway1_d:document.getElementById('m_a1_d').value,
    amway2:v('m_a2'),     amway2_d:document.getElementById('m_a2_d').value,
    amway3:v('m_a3'),     amway3_d:document.getElementById('m_a3_d').value,
    // 付款方式彙總
    payModes: Object.fromEntries(ALL_IDS.map(id => [id, payMode[id]])),
  };
  try {
    await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    showToast('✅ 已送出到 Google Sheets！');
    clearForm();
    setTimeout(loadChartData, 2000);
  } catch(e) {
    showToast('❌ 上傳失敗，請確認網路', true);
  } finally {
    btn.disabled=false; btn.textContent='☁️ 送出到 Google Sheets';
  }
}

function clearForm() {
  ALL_IDS.forEach(id=>{
    document.getElementById(id).value='';
    const det=document.getElementById(id+'_d');
    if(det) det.value='';
    rawAmt[id] = 0;
    coinMode[id] = 'up';
    payMode[id] = 'cash';
    const toggle = document.getElementById('ct_'+id);
    if(toggle){
      toggle.classList.remove('show');
      const btns = toggle.querySelectorAll('.coin-btn');
      btns[0].classList.add('active-up');
      btns[1].classList.remove('active-down');
    }
    const ptoggle = document.getElementById('pt_'+id);
    if(ptoggle){
      ptoggle.classList.remove('show');
      const pbtns = ptoggle.querySelectorAll('.pay-btn');
      pbtns[0].classList.add('active');
      for(let i=1;i<pbtns.length;i++) pbtns[i].classList.remove('active');
    }
  });
  document.getElementById('entryMemo').value='';
  document.getElementById('walletBal').value='';
  calc();
}

// ── Tab 切換 ─────────────────────────────────────────
function switchTab(el, name) {
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['food','transport','misc'].forEach(t=>document.getElementById('tab-'+t).style.display=t===name?'':'none');
}

// ── 圖表 ─────────────────────────────────────────────
async function loadChartData() {
  const today = new Date();
  const yr = today.getFullYear();
  const mo = today.getMonth() + 1;
  document.getElementById('chartLoading').style.display = 'block';
  document.getElementById('myChart').style.display = 'none';
  document.getElementById('chartSubTitle').textContent = '載入中…';
  try {
    const url = `${GAS_URL}?action=month&year=${yr}&month=${mo}&sheet=${SHEET_NAME}`;
    const res = await fetch(url);
    const json = await res.json();
    if (json.status === 'ok') {
      sheetRows = json.rows || [];
      document.getElementById('chartSubTitle').textContent = `${mo}月共 ${sheetRows.length} 筆`;
      renderChart();
    } else {
      document.getElementById('chartSubTitle').textContent = '讀取失敗：' + json.message;
      document.getElementById('chartLoading').textContent = '讀取失敗，請重新整理';
    }
  } catch(e) {
    document.getElementById('chartSubTitle').textContent = '網路錯誤';
    document.getElementById('chartLoading').textContent = '無法連線到 GAS';
  }
}

function buildData() {
  if (chartMode === 'pie') {
    let food=0, transport=0, misc=0;
    sheetRows.forEach(r => {
      food      += r.breakfast + r.lunch + r.dinner + r.afternoon + r.night + r.drink;
      transport += r.car + r.moto + r.t1 + r.t2 + r.park1 + r.park2;
      misc      += r.misc1 + r.misc2 + r.misc3 + r.amway1 + r.amway2 + r.amway3;
    });
    return {
      labels: ['飲食','交通','雜項'],
      datasets: [{data:[food,transport,misc],backgroundColor:['#F0A52A','#38C9A8','#A57FE8'],borderWidth:0,hoverOffset:6}]
    };
  } else {
    const days = {};
    sheetRows.forEach(r => {
      const label = r.date;
      const total = r.breakfast+r.lunch+r.dinner+r.afternoon+r.night+r.drink
                  + r.car+r.moto+r.t1+r.t2+r.park1+r.park2
                  + r.misc1+r.misc2+r.misc3+r.amway1+r.amway2+r.amway3;
      days[label] = (days[label]||0) + total;
    });
    const labels = Object.keys(days).sort();
    return {labels,datasets:[{data:labels.map(l=>days[l]),backgroundColor:'#4A9EFF',borderRadius:5,borderSkipped:false}]};
  }
}

function renderChart() {
  document.getElementById('chartLoading').style.display = 'none';
  document.getElementById('myChart').style.display = 'block';
  if (chart) chart.destroy();
  const ctx = document.getElementById('myChart').getContext('2d');
  const data = buildData();
  chart = new Chart(ctx, {
    type: chartMode === 'pie' ? 'doughnut' : 'bar',
    data,
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:ctx=>' NT$'+Math.round(ctx.raw).toLocaleString()}}
      },
      scales: chartMode === 'bar' ? {
        x:{ticks:{color:'#8FA5BB',font:{size:11}},grid:{color:'rgba(255,255,255,0.05)'}},
        y:{ticks:{color:'#8FA5BB',font:{size:11},callback:v=>'NT$'+v.toLocaleString()},grid:{color:'rgba(255,255,255,0.05)'}}
      } : {}
    }
  });
  const lg = document.getElementById('legendGrid');
  if (chartMode === 'pie') {
    const totals = data.datasets[0].data;
    const grand = totals.reduce((a,b)=>a+b,0);
    const items = [['飲食','#F0A52A'],['交通','#38C9A8'],['雜項','#A57FE8']];
    lg.innerHTML = items.map((it,i)=>
      `<div class="legend-item"><span class="legend-dot" style="background:${it[1]}"></span>${it[0]} <strong style="color:var(--text)">NT$${Math.round(totals[i]).toLocaleString()}</strong> <span style="color:var(--text3);font-size:12px">${grand?Math.round(totals[i]/grand*100):0}%</span></div>`
    ).join('')+`<div class="legend-item" style="grid-column:1/-1;margin-top:4px;color:var(--text3)">合計 <strong style="color:var(--amber)">NT$${Math.round(grand).toLocaleString()}</strong></div>`;
  } else {
    const grand = data.datasets[0].data.reduce((a,b)=>a+b,0);
    lg.innerHTML = `<div class="legend-item" style="grid-column:1/-1">本月累計 <strong style="color:var(--amber)">NT$${Math.round(grand).toLocaleString()}</strong></div>`;
  }
}

function switchChart(el, mode) {
  document.querySelectorAll('.chart-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  chartMode = mode;
  if (sheetRows.length > 0) renderChart();
}

init();
</script>
