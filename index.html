<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日常帳本記錄器</title>
<style>
  :root {
    --bg: #0F1923;
    --bg2: #162032;
    --bg3: #1E2D40;
    --card: #1A2D3D;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #E8EDF2;
    --text2: #8FA5BB;
    --text3: #5A7A96;
    --accent: #4A9EFF;
    --accent2: #2979C9;
    --green: #3DB87A;
    --amber: #F0A52A;
    --red: #E85454;
    --purple: #A57FE8;
    --teal: #38C9A8;
    --radius: 10px;
    --radius-lg: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'PingFang TC', 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* Header */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { font-size: 21px; font-weight: 600; letter-spacing: 0.5px; }
  header .date-badge {
    font-size: 17px;
    color: var(--text2);
    background: var(--bg3);
    padding: 5px 16px;
    border-radius: 24px;
    border: 1px solid var(--border);
  }

  /* Sections */
  .section { padding: 24px 16px 0; }
  .section-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  /* Status bar */
  .status-bar {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    margin: 16px 16px 0;
  }
  .status-row { display: flex; gap: 16px; }
  .status-card {
    flex: 1;
    background: var(--bg3);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
  }
  .status-card .label { font-size: 15px; color: var(--text3); margin-bottom: 6px; }
  .status-card .value { font-size: 24px; font-weight: 700; }
  .status-card .value.green { color: var(--green); }
  .status-card .value.amber { color: var(--amber); }
  .status-card .value.red { color: var(--red); }

  /* Date row */
  .date-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .date-row label { font-size: 17px; color: var(--text2); white-space: nowrap; }
  .date-row input[type=date] {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    padding: 10px 16px;
    font-size: 18px;
    outline: none;
  }
  .date-row input[type=date]:focus { border-color: var(--accent); }

  /* Memo */
  .memo-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    padding: 10px 16px;
    font-size: 18px;
    outline: none;
    margin-bottom: 16px;
    resize: none;
  }
  .memo-input::placeholder { color: var(--text3); }
  .memo-input:focus { border-color: var(--accent); }

  /* Category tabs */
  .cat-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    overflow-x: auto;
    padding-bottom: 2px;
  }
  .cat-tab {
    flex-shrink: 0;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 24px;
    color: var(--text2);
    padding: 7px 16px;
    font-size: 17px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .cat-tab.active { background: var(--accent2); border-color: var(--accent); color: #fff; }

  /* Sub-items grid */
  .items-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .item-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .item-card .item-label {
    font-size: 15px;
    color: var(--text3);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .item-card .item-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    display: inline-block;
  }
  .item-row { display: flex; gap: 6px; }
  .item-amount {
    width: 76px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 7px;
    color: var(--text);
    padding: 7px 8px;
    font-size: 18px;
    outline: none;
    text-align: right;
    flex-shrink: 0;
  }
  .item-amount:focus { border-color: var(--accent); }
  .item-detail {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 7px;
    color: var(--text);
    padding: 7px 8px;
    font-size: 17px;
    outline: none;
    min-width: 0;
  }
  .item-detail::placeholder { color: var(--text3); }
  .item-detail:focus { border-color: var(--accent); }

  /* Wallet section */
  .wallet-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
  }
  .wallet-label {
    font-size: 17px;
    color: var(--text2);
    white-space: nowrap;
    min-width: 80px;
  }
  .wallet-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 7px;
    color: var(--text);
    padding: 8px 10px;
    font-size: 19px;
    font-weight: 600;
    outline: none;
    text-align: right;
  }
  .wallet-input:focus { border-color: var(--green); }
  .wallet-note {
    font-size: 16px;
    color: var(--text3);
    flex-shrink: 0;
  }

  /* Daily total bar */
  .daily-total {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .daily-total .label { font-size: 17px; color: var(--text2); }
  .daily-total .amount { font-size: 22px; font-weight: 700; color: var(--amber); }

  /* Submit button */
  .submit-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: var(--radius);
    color: #fff;
    padding: 18px;
    font-size: 19px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity 0.15s;
    margin-top: 4px;
  }
  .submit-btn:active { opacity: 0.85; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(0);
    background: #1A3A2A;
    border: 1px solid var(--green);
    color: var(--green);
    padding: 16px 28px;
    border-radius: 28px;
    font-size: 18px;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 200;
  }
  .toast.error { background: #3A1A1A; border-color: var(--red); color: var(--red); }
  .toast.show { opacity: 1; }

  /* Config panel */
  .config-panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    margin: 16px 16px 0;
  }
  .config-panel summary {
    font-size: 17px;
    color: var(--text2);
    cursor: pointer;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .config-panel summary::-webkit-details-marker { display: none; }
  .config-inner { margin-top: 18px; }
  .config-field { margin-bottom: 16px; }
  .config-field label { font-size: 16px; color: var(--text3); display: block; margin-bottom: 5px; }
  .config-field input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 7px;
    color: var(--text);
    padding: 9px 16px;
    font-size: 17px;
    font-family: monospace;
    outline: none;
  }
  .config-field input:focus { border-color: var(--accent); }
  .config-save {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 7px;
    color: var(--text2);
    padding: 8px 22px;
    font-size: 17px;
    cursor: pointer;
  }
  .config-save:hover { border-color: var(--accent); color: var(--accent); }
  .config-tip {
    font-size: 16px;
    color: var(--text3);
    margin-top: 10px;
    line-height: 1.6;
  }
  .config-tip a { color: var(--accent); text-decoration: none; }

  /* Dot colors */
  .dot-food { background: var(--amber); }
  .dot-transport { background: var(--teal); }
  .dot-misc { background: var(--purple); }

  .spinner { display: inline-block; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>📒 日常帳本</h1>
  <div class="date-badge" id="headerDate"></div>
</header>

<!-- 餘額狀態 -->
<div class="status-bar">
  <div class="status-row">
    <div class="status-card">
      <div class="label">今日支出</div>
      <div class="value amber" id="statToday">$0</div>
    </div>
    <div class="status-card">
      <div class="label">錢包餘額</div>
      <div class="value green" id="statWallet">—</div>
    </div>
  </div>
</div>

<!-- 設定面板 -->
<div class="config-panel">
  <details id="configDetails">
    <summary>⚙️ Google Sheets 連線設定</summary>
    <div class="config-inner">
      <div class="config-field">
        <label>GAS Web App 網址（部署後貼上）</label>
        <input type="url" id="gasUrl" placeholder="https://script.google.com/macros/s/AK...Q/exec">
      </div>
      <div class="config-field">
        <label>Sheet 名稱（對應帳本分頁）</label>
        <input type="text" id="sheetName" placeholder="2026">
      </div>
      <button class="config-save" onclick="saveConfig()">儲存設定</button>
      <div class="config-tip">
        還沒設好？<a href="Code.gs" download>下載 Code.gs</a> → 貼入 Google Apps Script → 部署為 Web App → 把網址貼上來。<br>
        詳細步驟見 <a href="README.md" download>README.md</a>。
      </div>
    </div>
  </details>
</div>

<!-- 主記帳區 -->
<div class="section">
  <div class="section-title">今日記帳</div>

  <!-- 日期 & 備忘 -->
  <div class="date-row">
    <label>日期</label>
    <input type="date" id="entryDate">
  </div>
  <textarea class="memo-input" id="entryMemo" rows="2" placeholder="今日活動備忘（例：排球、益豪開會、五指山）"></textarea>

  <!-- 類別 tabs -->
  <div class="cat-tabs">
    <div class="cat-tab active" onclick="switchTab(this,'food')">🍱 飲食</div>
    <div class="cat-tab" onclick="switchTab(this,'transport')">🚇 交通</div>
    <div class="cat-tab" onclick="switchTab(this,'misc')">🗂 雜項</div>
  </div>

  <!-- 飲食 -->
  <div id="tab-food">
    <div class="items-grid">
      <div class="item-card">
        <div class="item-label"><span class="item-dot dot-food"></span>早餐</div>
        <div class="item-row">
          <input class="item-amount" type="number" id="f_breakfast" placeholder="0" min="0" oninput="calcTotal()">
          <input class="item-detail" type="text" id="f_breakfast_d" placeholder="明細">
        </div>
      </div>
      <div class="item-card">
        <div class="item-label"><span class="item-dot dot-food"></span>午餐</div>
        <div class="item-row">
          <input class="item-amount" type="number" id="f_lunch" placeholder="0" min="0" oninput="calcTotal()">
          <input class="item-detail" type="text" id="f_lunch_d" placeholder="明細">
        </div>
      </div>
      <div class="item-card">
        <div class="item-label"><span class="item-dot dot-food"></span>晚餐</div>
        <div class="item-row">
          <input class="item-amount" type="number" id="f_dinner" placeholder="0" min="0" oninput="calcTotal()">
          <input class="item-detail" type="text" id="f_dinner_d" placeholder="明細">
        </div>
      </div>
      <div class="item-card">
        <div class="item-label"><span class="item-dot dot-food"></span>下午茶</div>
        <div class="item-row">
          <input class="item-amount" type="number" id="f_afternoon" placeholder="0" min="0" oninput="calcTotal()">
          <input class="item-detail" type="text" id="f_afternoon_d" placeholder="明細">
        </div>
      </div>
      <div class="item-card">
        <div class="item-label"><span class="item-dot dot-food"></span>飲料</div>
        <div class="item-row">
          <input class="item-amount" type="number" id="f_drink" placeholder="0" min="0" oninput="calcTotal()">
          <input class="item-detail" type="text" id="f_drink_d" placeholder="明細">
        </div>
      </div>
      <div class="item-card">
        <div class="item-label"><span class="item-dot dot-food"></span>消夜</div>
        <div class="item-row">
          <input class="item-amount" type="number" id="f_night" placeholder="0" min="0" oninput="calcTotal()">
          <input class="item-detail" type="text" id="f_night_d" placeholder="明細">
        </div>
      </div>
    </div>
  </div>

  <!-- 交通 -->
  <div id="tab-transport" style="display:none">
    <div class="items-grid">
      <div class="item-card">
        <div class="item-label"><span class="item-dot dot-transport"></span>汽車油錢</div>
        <div class="item-row">
          <input class="item-amount" type="number" id="t_car" placeholder="0" min="0" oninput="calcTotal()">
          <input class="item-detail" type="text" id="t_car_d" placeholder="明細">
        </div>
      </div>
      <div class="item-card">
        <div class="item-label"><span class="item-dot dot-transport"></span>機車油錢</div>
        <div class="item-row">
          <input class="item-amount" type="number" id="t_moto" placeholder="0" min="0" oninput="calcTotal()">
          <input class="item-detail" type="text" id="t_moto_d" placeholder="明細">
        </div>
      </div>
      <div class="item-card">
        <div class="item-label"><span class="item-dot dot-transport"></span>交通 1</div>
        <div class="item-row">
          <input class="item-amount" type="number" id="t_1" placeholder="0" min="0" oninput="calcTotal()">
          <input class="item-detail" type="text" id="t_1_d" placeholder="明細">
        </div>
      </div>
      <div class="item-card">
        <div class="item-label"><span class="item-dot dot-transport"></span>交通 2</div>
        <div class="item-row">
          <input class="item-amount" type="number" id="t_2" placeholder="0" min="0" oninput="calcTotal()">
          <input class="item-detail" type="text" id="t_2_d" placeholder="明細">
        </div>
      </div>
      <div class="item-card">
        <div class="item-label"><span class="item-dot dot-transport"></span>停車費 1</div>
        <div class="item-row">
          <input class="item-amount" type="number" id="t_park1" placeholder="0" min="0" oninput="calcTotal()">
          <input class="item-detail" type="text" id="t_park1_d" placeholder="明細">
        </div>
      </div>
      <div class="item-card">
        <div class="item-label"><span class="item-dot dot-transport"></span>停車費 2</div>
        <div class="item-row">
          <input class="item-amount" type="number" id="t_park2" placeholder="0" min="0" oninput="calcTotal()">
          <input class="item-detail" type="text" id="t_park2_d" placeholder="明細">
        </div>
      </div>
    </div>
  </div>

  <!-- 雜項 -->
  <div id="tab-misc" style="display:none">
    <div class="items-grid">
      <div class="item-card">
        <div class="item-label"><span class="item-dot dot-misc"></span>雜項 1</div>
        <div class="item-row">
          <input class="item-amount" type="number" id="m_1" placeholder="0" min="0" oninput="calcTotal()">
          <input class="item-detail" type="text" id="m_1_d" placeholder="明細">
        </div>
      </div>
      <div class="item-card">
        <div class="item-label"><span class="item-dot dot-misc"></span>雜項 2</div>
        <div class="item-row">
          <input class="item-amount" type="number" id="m_2" placeholder="0" min="0" oninput="calcTotal()">
          <input class="item-detail" type="text" id="m_2_d" placeholder="明細">
        </div>
      </div>
      <div class="item-card">
        <div class="item-label"><span class="item-dot dot-misc"></span>雜項 3</div>
        <div class="item-row">
          <input class="item-amount" type="number" id="m_3" placeholder="0" min="0" oninput="calcTotal()">
          <input class="item-detail" type="text" id="m_3_d" placeholder="明細">
        </div>
      </div>
      <div class="item-card">
        <div class="item-label"><span class="item-dot dot-misc"></span>美安消費 1</div>
        <div class="item-row">
          <input class="item-amount" type="number" id="m_amway1" placeholder="0" min="0" oninput="calcTotal()">
          <input class="item-detail" type="text" id="m_amway1_d" placeholder="明細">
        </div>
      </div>
      <div class="item-card">
        <div class="item-label"><span class="item-dot dot-misc"></span>美安消費 2</div>
        <div class="item-row">
          <input class="item-amount" type="number" id="m_amway2" placeholder="0" min="0" oninput="calcTotal()">
          <input class="item-detail" type="text" id="m_amway2_d" placeholder="明細">
        </div>
      </div>
      <div class="item-card">
        <div class="item-label"><span class="item-dot dot-misc"></span>美安消費 3</div>
        <div class="item-row">
          <input class="item-amount" type="number" id="m_amway3" placeholder="0" min="0" oninput="calcTotal()">
          <input class="item-detail" type="text" id="m_amway3_d" placeholder="明細">
        </div>
      </div>
    </div>
  </div>

  <!-- 錢包餘額 -->
  <div class="section-title" style="margin-top:8px">錢包餘額</div>
  <div class="wallet-row">
    <div class="wallet-label">💰 錢包</div>
    <input class="wallet-input" type="number" id="walletBalance" placeholder="0" min="0">
    <div class="wallet-note">元</div>
  </div>

  <!-- 今日合計 -->
  <div class="daily-total">
    <div class="label">今日總支出</div>
    <div class="amount" id="totalAmount">$0</div>
  </div>

  <!-- 送出 -->
  <button class="submit-btn" id="submitBtn" onclick="submitEntry()">
    ☁️ 送出到 Google Sheets
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
const FIELDS = {
  food: ['f_breakfast','f_lunch','f_dinner','f_afternoon','f_drink','f_night'],
  transport: ['t_car','t_moto','t_1','t_2','t_park1','t_park2'],
  misc: ['m_1','m_2','m_3','m_amway1','m_amway2','m_amway3']
}

function init() {
  const today = new Date()
  const yyyy = today.getFullYear()
  const mm = String(today.getMonth()+1).padStart(2,'0')
  const dd = String(today.getDate()).padStart(2,'0')
  document.getElementById('entryDate').value = `${yyyy}-${mm}-${dd}`
  document.getElementById('headerDate').textContent = `${mm}/${dd}`
  loadConfig()
  calcTotal()
}

function switchTab(el, name) {
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'))
  el.classList.add('active')
  ;['food','transport','misc'].forEach(t=>{
    document.getElementById('tab-'+t).style.display = t===name?'':'none'
  })
  calcTotal()
}

function v(id) { return parseFloat(document.getElementById(id).value)||0 }

function calcTotal() {
  const all = [...FIELDS.food,...FIELDS.transport,...FIELDS.misc]
  const total = all.reduce((sum,id)=>sum+v(id),0)
  document.getElementById('totalAmount').textContent = '$'+total.toLocaleString()
  document.getElementById('statToday').textContent = '$'+total.toLocaleString()
  const wallet = v('walletBalance')
  if (wallet>0) {
    document.getElementById('statWallet').textContent = '$'+wallet.toLocaleString()
    document.getElementById('statWallet').className = 'value '+(wallet<500?'red':wallet<2000?'amber':'green')
  }
}

document.getElementById('walletBalance').addEventListener('input', calcTotal)

function saveConfig() {
  const url = document.getElementById('gasUrl').value.trim()
  const sheet = document.getElementById('sheetName').value.trim()||'2026'
  localStorage.setItem('GAS_URL', url)
  localStorage.setItem('SHEET_NAME', sheet)
  showToast('設定已儲存 ✓', false)
  if (url) document.getElementById('configDetails').removeAttribute('open')
}

function loadConfig() {
  const url = localStorage.getItem('GAS_URL')||''
  const sheet = localStorage.getItem('SHEET_NAME')||'2026'
  document.getElementById('gasUrl').value = url
  document.getElementById('sheetName').value = sheet
  if (!url) document.getElementById('configDetails').setAttribute('open','')
}

function showToast(msg, isError=false) {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.className = 'toast'+(isError?' error':'')
  t.classList.add('show')
  setTimeout(()=>t.classList.remove('show'), 3000)
}

async function submitEntry() {
  const gasUrl = localStorage.getItem('GAS_URL')||''
  if (!gasUrl) {
    showToast('請先設定 GAS 網址 ↑', true)
    document.getElementById('configDetails').setAttribute('open','')
    return
  }

  const btn = document.getElementById('submitBtn')
  btn.disabled = true
  btn.innerHTML = '<span class="spinner">⏳</span> 上傳中…'

  const d = document.getElementById('entryDate').value
  const payload = {
    sheet: localStorage.getItem('SHEET_NAME')||'2026',
    date: d,
    memo: document.getElementById('entryMemo').value.trim(),
    wallet: v('walletBalance'),
    // food
    breakfast: v('f_breakfast'), breakfast_d: document.getElementById('f_breakfast_d').value,
    lunch: v('f_lunch'), lunch_d: document.getElementById('f_lunch_d').value,
    dinner: v('f_dinner'), dinner_d: document.getElementById('f_dinner_d').value,
    afternoon: v('f_afternoon'), afternoon_d: document.getElementById('f_afternoon_d').value,
    drink: v('f_drink'), drink_d: document.getElementById('f_drink_d').value,
    night: v('f_night'), night_d: document.getElementById('f_night_d').value,
    // transport
    car: v('t_car'), car_d: document.getElementById('t_car_d').value,
    moto: v('t_moto'), moto_d: document.getElementById('t_moto_d').value,
    t1: v('t_1'), t1_d: document.getElementById('t_1_d').value,
    t2: v('t_2'), t2_d: document.getElementById('t_2_d').value,
    park1: v('t_park1'), park1_d: document.getElementById('t_park1_d').value,
    park2: v('t_park2'), park2_d: document.getElementById('t_park2_d').value,
    // misc
    misc1: v('m_1'), misc1_d: document.getElementById('m_1_d').value,
    misc2: v('m_2'), misc2_d: document.getElementById('m_2_d').value,
    misc3: v('m_3'), misc3_d: document.getElementById('m_3_d').value,
    amway1: v('m_amway1'), amway1_d: document.getElementById('m_amway1_d').value,
    amway2: v('m_amway2'), amway2_d: document.getElementById('m_amway2_d').value,
    amway3: v('m_amway3'), amway3_d: document.getElementById('m_amway3_d').value,
  }

  try {
    const res = await fetch(gasUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    showToast('✅ 已送出到 Google Sheets！')
    clearForm()
  } catch(e) {
    showToast('❌ 上傳失敗，請確認網址或網路', true)
  } finally {
    btn.disabled = false
    btn.innerHTML = '☁️ 送出到 Google Sheets'
  }
}

function clearForm() {
  const allIds = [...FIELDS.food,...FIELDS.transport,...FIELDS.misc]
  allIds.forEach(id=>{
    document.getElementById(id).value=''
    const detail = document.getElementById(id+'_d')
    if(detail) detail.value=''
  })
  document.getElementById('entryMemo').value=''
  document.getElementById('walletBalance').value=''
  calcTotal()
}

init()
</script>
</body>
</html>
